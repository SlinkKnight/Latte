<style>
:root {
  --bg0-h:#1d2021; --bg0:#282828; --bg1:#3c3836; --bg2:#504945;
  --bg3:#665c54;   --bg4:#7c6f64; --fg1:#ebdbb2; --fg2:#d5c4a1;
  --fg4:#a89984;   --yellow:#fabd2f; --aqua:#8ec07c; --orange:#fe8019;
  --purple:#d3869b; --green:#b8bb26; --blue:#83a598; --red:#fb4934;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:var(--bg0);
  color:var(--fg1);
  font-family:'JetBrains Mono',monospace;
  height:100vh;
  display:flex;
  overflow:hidden;
  font-size:13px;
}

::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

#lib {
  width:260px;
  min-width:160px;
  max-width:420px;
  background:var(--bg0-h);
  border-right:1px solid var(--bg1);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}

.lib-search { padding:9px; flex-shrink:0; position:relative; }
.lib-search input {
  width:100%;
  background:var(--bg1);
  border:1px solid transparent;
  border-radius:3px;
  color:var(--fg1);
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  padding:6px 8px 6px 26px;
  outline:none;
  transition:border-color 0.12s;
}
.lib-search input:focus { border-color:var(--yellow); }
.lib-search input::placeholder { color:var(--bg4); }
.lib-search .si {
  position:absolute; left:17px; top:50%;
  transform:translateY(-50%);
  font-size:12px; color:var(--bg4); pointer-events:none;
}
.lib-body { flex:1; overflow-y:auto; }

.sec { border-bottom:1px solid var(--bg1); }
.sec-hdr {
  display:flex; align-items:center; gap:7px;
  padding:7px 11px; cursor:pointer; user-select:none;
  transition:background 0.08s;
}
.sec-hdr:hover { background:var(--bg1); }
.sec-icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }
.sec-title { font-size:10.5px; font-weight:700; color:var(--fg2); flex:1; }
.sec-desc { font-size:8.5px; color:var(--bg4); }
.sec-arr { font-size:7px; color:var(--bg3); transition:transform 0.15s; }
.sec.open .sec-arr { transform:rotate(90deg); }
.sec-body { display:none; padding:4px 9px 8px; }
.sec.open .sec-body { display:block; }

.tpl-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.tpl-card {
  background:var(--bg1); border:1px solid transparent; border-radius:3px;
  padding:6px 4px 5px; cursor:pointer; transition:all 0.09s;
  display:flex; flex-direction:column; align-items:center; gap:2px; user-select:none;
}
.tpl-card:hover { background:var(--bg2); border-color:var(--orange); transform:translateY(-1px); }
.tpl-card:active { transform:scale(0.94); }
.tc-pre { font-family:'Libre Baskerville',serif; font-size:15px; color:var(--orange); line-height:1; min-height:20px; display:flex; align-items:center; }
.tc-lbl { font-size:7.5px; color:var(--fg4); text-align:center; }

.sym-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:2px; }
.sym {
  background:var(--bg1); border:1px solid transparent; border-radius:3px;
  padding:5px 2px; display:flex; flex-direction:column; align-items:center;
  gap:1px; cursor:pointer; transition:all 0.09s; user-select:none; position:relative;
}
.sym:hover { background:var(--bg2); border-color:var(--yellow); transform:translateY(-1px); z-index:2; }
.sym:active { transform:scale(0.9); }
.sg { font-family:'Libre Baskerville',serif; font-size:14px; color:var(--aqua); line-height:1; }
.sn { font-size:6.5px; color:var(--fg4); text-align:center; max-width:44px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.st {
  display:none; position:absolute; bottom:calc(100% + 3px); left:50%;
  transform:translateX(-50%); background:var(--bg0-h); border:1px solid var(--bg2);
  border-radius:3px; padding:3px 7px; font-size:9.5px; color:var(--fg1);
  white-space:nowrap; z-index:30; pointer-events:none; line-height:1.5;
}
.sym:hover .st { display:block; }
.search-empty { padding:18px; text-align:center; color:var(--bg4); font-size:11px; }

#resize-lib {
  width:4px;
  background:transparent;
  cursor:col-resize;
  flex-shrink:0;
  transition:background 0.12s;
  z-index:10;
}
#resize-lib:hover, #resize-lib.dragging { background:var(--bg3); }

#right {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}

#editor-wrap {
  display:flex;
  overflow:hidden;
  background:var(--bg0);
  flex:1;
  min-height:80px;
}
#line-nums {
  background:var(--bg0-h);
  border-right:1px solid var(--bg1);
  padding:16px 9px 16px 6px;
  color:var(--bg3);
  font-size:12.5px;
  line-height:1.7;
  text-align:right;
  user-select:none;
  overflow:hidden;
  flex-shrink:0;
  min-width:36px;
  font-family:'JetBrains Mono',monospace;
}
#editor {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--fg1); font-family:'JetBrains Mono',monospace;
  font-size:12.5px; line-height:1.7; padding:16px 20px;
  resize:none; overflow-y:auto; caret-color:var(--yellow);
}
#editor::selection { background:var(--bg2); }
#line-nums div { height:calc(12.5px * 1.7); line-height:calc(12.5px * 1.7); }

#resize-prev {
  height:5px;
  background:transparent;
  cursor:row-resize;
  flex-shrink:0;
  transition:background 0.12s;
  z-index:10;
  border-top:1px solid var(--bg1);
  position:relative;
}
#resize-prev:hover, #resize-prev.dragging { background:var(--bg2); }
#resize-prev::after {
  content:'';
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:32px; height:2px;
  background:var(--bg3);
  border-radius:1px;
}

#preview-wrap {
  background:var(--bg0-h);
  overflow:auto;
  padding:16px 32px;
  flex-shrink:0;
  height:260px;
  min-height:80px;
}
#preview {
  font-family:'Libre Baskerville',serif;
  color:var(--fg1);
  font-size:clamp(20px, 2.5vw, 30px);
  line-height:2.2;
}
mjx-container { font-size:1em !important; }
mjx-container[display="true"] { margin:0.8em auto !important; display:block !important; text-align:center !important; }
mjx-container[display="true"] svg { transform:scale(1.2); transform-origin:center; }

.toast {
  position:fixed; bottom:16px; left:50%;
  transform:translateX(-50%) translateY(5px);
  background:var(--bg2); color:var(--yellow); border:1px solid var(--bg3);
  padding:6px 14px; border-radius:3px; font-size:10.5px;
  opacity:0; pointer-events:none; transition:all 0.15s; z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

const editor = document.getElementById('editor');
const lineNums = document.getElementById('line-nums');
const preview = document.getElementById('preview');
const libBody = document.getElementById('libBody');

const hist = [];
const fut = [];
let lastSaved = editor.value;
let lastPos = 0;
let renderTimeout = null;

function buildAll() {
  libBody.innerHTML = '';
  SECTIONS.forEach(s => {
    const w = document.createElement('div');
    w.className = 'sec' + (s.open ? ' open' : '');
    const h = document.createElement('div');
    h.className = 'sec-hdr';
    h.innerHTML = `<span class="sec-icon" style="color:${s.color}">${s.icon}</span><span class="sec-title">${s.title}</span><span class="sec-desc">${s.desc}</span><span class="sec-arr">▶</span>`;
    h.onclick = () => w.classList.toggle('open');
    w.appendChild(h);
    const b = document.createElement('div');
    b.className = 'sec-body';
    b.appendChild(s.type === 'tpl' ? makeTplGrid(s.items) : makeSymGrid(s.items));
    w.appendChild(b);
    libBody.appendChild(w);
  });
}

function makeTplGrid(items) {
  const g = document.createElement('div');
  g.className = 'tpl-grid';
  items.forEach(t => {
    const c = document.createElement('div');
    c.className = 'tpl-card';
    c.title = t.tip;
    const hotkeyLabel = t.hotkey ? ` (Ctrl+${t.hotkey.toUpperCase()})` : '';
    c.innerHTML = `<div class="tc-pre">${t.pre}</div><div class="tc-lbl">${t.lbl}${hotkeyLabel}</div>`;
    c.onclick = () => insert(t.code, t.lbl, true);
    g.appendChild(c);
  });
  return g;
}

function makeSymGrid(items) {
  const g = document.createElement('div');
  g.className = 'sym-grid';
  items.forEach(s => {
    const b = document.createElement('div');
    b.className = 'sym';
    const hotkeyLabel = s.hotkey ? ` (Ctrl+${s.hotkey.toUpperCase()})` : '';
    b.innerHTML = `<span class="sg">${s.g}</span><span class="sn">${s.n}</span><span class="st">${s.t}${hotkeyLabel}</span>`;
    b.onclick = () => insert(s.c, s.n);
    g.appendChild(b);
  });
  return g;
}

function onSearch(val) {
  val = val.trim().toLowerCase();
  if (!val) { buildAll(); return; }
  libBody.innerHTML = '';
  const tpls = [], syms = [];
  SECTIONS.forEach(s => {
    if (s.type === 'tpl') s.items.forEach(t => { if (t.lbl.toLowerCase().includes(val) || t.tip.toLowerCase().includes(val)) tpls.push(t); });
    else s.items.forEach(x => { if (x.n.toLowerCase().includes(val) || x.g === val || x.t.toLowerCase().includes(val) || x.c.includes(val)) syms.push(x); });
  });
  if (!tpls.length && !syms.length) { libBody.innerHTML = '<div class="search-empty">nenhum resultado</div>'; return; }
  const lbl = txt => { const d = document.createElement('div'); d.style.cssText='font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--bg4);padding:9px 11px 4px'; d.textContent=txt; return d; };
  if (tpls.length) { libBody.appendChild(lbl('Templates')); const g = makeTplGrid(tpls); g.style.padding='0 9px'; libBody.appendChild(g); }
  if (syms.length) { libBody.appendChild(lbl('Símbolos'));  const g = makeSymGrid(syms);  g.style.padding='0 9px'; libBody.appendChild(g); }
}

function updateLines() {
  const lineCount = editor.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lineCount; i++) {
    html += `<div>${i}</div>`;
  }
  lineNums.innerHTML = html;
}

editor.addEventListener('scroll', () => { lineNums.scrollTop = editor.scrollTop; });

function snap() {
  if (editor.value !== lastSaved) {
    hist.push({ val: lastSaved, pos: lastPos });
    fut.length = 0;
    lastSaved = editor.value;
  }
  lastPos = editor.selectionStart;
}

function undo() {
  if (editor.value !== lastSaved) {
    fut.push({ val: editor.value, pos: editor.selectionStart });
    hist.push({ val: lastSaved, pos: lastPos });
    lastSaved = editor.value;
  }
  if (!hist.length) return;
  const snap = hist.pop();
  fut.push({ val: editor.value, pos: editor.selectionStart });
  editor.value = snap.val;
  lastSaved = snap.val;
  lastPos = snap.pos;
  editor.setSelectionRange(snap.pos, snap.pos);
  updateLines(); render();
}

function redo() {
  if (!fut.length) return;
  hist.push({ val: editor.value, pos: editor.selectionStart });
  const snap = fut.pop();
  editor.value = snap.val;
  lastSaved = snap.val;
  lastPos = snap.pos;
  editor.setSelectionRange(snap.pos, snap.pos);
  updateLines(); render();
}

editor.addEventListener('beforeinput', (e) => {
  const pos = editor.selectionStart;
  const text = editor.value;
  if (text[pos] === '•' && e.data && e.data !== '•') {
    editor.value = text.slice(0, pos) + text.slice(pos + 1);
    editor.setSelectionRange(pos, pos);
  }
});

editor.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey;

  if (mod && e.key.toLowerCase() === 'f') { e.preventDefault(); insert('\\frac{•}{•}', 'Fração', true); return; }
  if (mod && e.key.toLowerCase() === 'r') { e.preventDefault(); insert('\\sqrt{•}', 'Raiz', true); return; }
  if (mod && e.key.toLowerCase() === 'p') { e.preventDefault(); insert('\\left( • \\right)', 'Parênteses'); return; }

  if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((mod && e.key === 'z' && e.shiftKey) || (mod && e.key === 'y')) { e.preventDefault(); redo(); return; }

  if (e.key === 'Tab') {
    e.preventDefault();
    const pos = editor.selectionStart;
    const text = editor.value;
    let next = text.indexOf('•', pos + 1);
    if (next === -1) next = text.indexOf('•');
    if (next !== -1) { editor.setSelectionRange(next, next); return; }
    snap();
    editor.value = text.slice(0,pos) + '  ' + text.slice(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = pos + 2;
    updateLines();
  }
});

editor.addEventListener('input', () => {
  lastPos = editor.selectionStart;
  updateLines();
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 100);
});

function isInsideMath(text, pos) {
  const before = text.slice(0, pos);
  const openDisplay = (before.match(/\\\[/g) || []).length;
  const closeDisplay = (before.match(/\\\]/g) || []).length;
  const inline = (before.match(/\$/g) || []).length;
  return (openDisplay > closeDisplay) || (inline % 2 === 1);
}

function insert(code, label, isTpl) {
  snap();
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const text = editor.value;
  let before = text.slice(0, s);
  let after = text.slice(e);
  const inMath = isInsideMath(text, s);
  let ins;
  if (isTpl) {
    let cleanCode = code.replace(/\\\[\s*|\\\]\s*/g, '').trim();
    if (inMath) {
      ins = cleanCode;
    } else {
      ins = `\n\\[\n${cleanCode}\n\\]\n`;
    }
  } else {
    if (inMath) {
      ins = code;
    } else {
      ins = `$${code}$`;
    }
  }
  const markerIndex = ins.indexOf('•');
  editor.value = before + ins + after;
  const newPos = s + (markerIndex >= 0 ? markerIndex : ins.length);
  editor.setSelectionRange(newPos, newPos);
  editor.focus();
  updateLines();
  render();
}

function render() {
  const raw = editor.value;
  const m = raw.match(/\\begin\{document\}([\s\S]*?)\\end\{document\}/);
  const body = m ? m[1] : raw;
  preview.innerHTML = body.replace(/%[^\n]*/g, '');
  if (window.MathJax) MathJax.typesetPromise([preview]).catch(() => {});
}

(() => {
  const handle = document.getElementById('resize-lib');
  const lib = document.getElementById('lib');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = lib.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(Math.max(startW + (e.clientX - startX), 160), 420);
    lib.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; handle.classList.remove('dragging');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });
})();

(() => {
  const handle = document.getElementById('resize-prev');
  const wrap = document.getElementById('preview-wrap');
  const right = document.getElementById('right');
  let dragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startH = wrap.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const max = right.offsetHeight - 80;
    const h = Math.min(Math.max(startH - (e.clientY - startY), 60), max);
    wrap.style.height = h + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; handle.classList.remove('dragging');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });
})();

buildAll();
updateLines();

setTimeout(() => {
  const text = editor.value;
  // Find the empty line between \[ and \] and place cursor there
  const openBracket = text.indexOf('\\[\n');
  const cursorPos = openBracket !== -1 ? openBracket + 3 : 0;
  editor.focus();
  editor.setSelectionRange(cursorPos, cursorPos);
}, 0);

window.addEventListener('load', render);
</script>
</body>
</html>
